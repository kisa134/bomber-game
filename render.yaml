# Render blueprint. In Render: New + -> Blueprint -> pick this repo (branch main).
# Render reads everything from here, so there's nothing to configure by hand.
services:
  - type: web
    name: bomberpump
    runtime: docker
    plan: starter # always-on (no idle spin-down / cold starts)
    region: frankfurt # close to EU/RU audience
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: . # build context = repo root (monorepo)
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      # Enables the launch-safety preflight (refuses to boot with a money-unsafe
      # config: non-Postgres store or missing AUTH_SECRET).
      - key: NODE_ENV
        value: production
      # REQUIRED for real money. Durable ledger — without it balances are lost on
      # every deploy. Must be Postgres (Supabase REST is non-atomic).
      - key: DATABASE_URL
        sync: false
      # REQUIRED. Random secret (>=16 chars) that signs sessions; identical on
      # every instance. Without it sessions reset on each restart.
      - key: AUTH_SECRET
        sync: false
      # Custody (required to enable deposits/withdrawals).
      - key: TREASURY_ADDRESS
        sync: false
      - key: TREASURY_SECRET
        sync: false
      - key: SOLANA_RPC # paid RPC (Helius/QuickNode/…); public endpoint is inadequate
        sync: false
      # Ops alerting: Discord/Slack incoming-webhook URL. Money-path failures
      # (withdraw/payout/crash) POST here so you're never blind. Optional.
      - key: ALERT_WEBHOOK
        sync: false
      # Telegram Mini App: set these in the Render dashboard after BotFather.
      # TG_BOT = bot username (no @), TG_APP = Mini App short name from /newapp.
      # Used only to bounce the Phantom wallet flow back into the Mini App.
      - key: TG_BOT
        sync: false
      - key: TG_APP
        sync: false
      # Bot that answers /start with the welcome post + Play button. Set the
      # BotFather API token here to enable it (the bot stays disabled if unset).
      - key: TG_BOT_TOKEN
        sync: false
      - key: TG_WEBHOOK_SECRET # optional: any random string to lock the webhook
        sync: false
      # Optional link buttons under the post (only shown when set).
      - key: TG_LINK_SITE
        sync: false
      - key: TG_LINK_X
        sync: false
      - key: TG_LINK_PUMP
        sync: false
      - key: TG_LINK_CHAT
        sync: false
      # Analytics. Client keys (VITE_*) are baked into the bundle at build time
      # (matching ARGs in the Dockerfile); server keys are runtime. All optional.
      - key: VITE_POSTHOG_KEY # PostHog publishable client key (phc_...)
        sync: false
      - key: VITE_GA_ID # Google Analytics 4 measurement id (G-...)
        sync: false
      - key: VITE_CLARITY_ID # Microsoft Clarity project id
        sync: false
      - key: POSTHOG_KEY # server-side PostHog key (for authoritative events)
        sync: false
      - key: ADMIN_TOKEN # protects /admin live dashboard (comma-separate for several passwords)
        sync: false
      - key: MAX_ROOMS # cap concurrent rooms (set from a load test; default 500)
        sync: false
      # Multi-region (optional). Set REGION_ID per instance (e.g. "eu") and the
      # SAME REGIONS JSON on every instance, e.g.
      #   [{"id":"eu","label":"Europe","url":"https://bombermeme.fun"},
      #    {"id":"us","label":"US","url":"https://us.bombermeme.fun"}]
      # The client probes each region's /ping and hops to the nearest. Leave both
      # unset to stay single-region (the feature is then fully inert).
      - key: REGION_ID
        sync: false
      - key: REGIONS
        sync: false
      - key: HOUSE_RAKE_BP # house rake in basis points (e.g. 500 = 5%); funds referrals
        sync: false
      - key: REFERRAL_ROOT # owner wallet = top of the pyramid; un-invited players attach here
        sync: false
      - key: METRICS_TOKEN # optional: require ?token=… on /metrics (Prometheus). Empty = open
        sync: false
      # Daily growth targets for the /admin cockpit (optional; defaults 10 / 30).
      - key: GROWTH_TARGET_PAYING # paying players/day goal (default 10)
        sync: false
      - key: GROWTH_TARGET_DAU # DAU goal (default 30)
        sync: false
      - key: GROWTH_TARGET_MATCHES # matches/day goal (0 = no target)
        sync: false
      - key: GROWTH_TARGET_DEPOSITORS # depositors/day goal (0 = no target)
        sync: false
      - key: POSTHOG_EMBED_URL # PostHog shared dashboard embed URL (shown inside /admin)
        sync: false
      - key: GA_DASHBOARD_URL # Google Analytics link (button in /admin)
        sync: false
      - key: GA_EMBED_URL # optional Looker Studio (GA4) report URL to iframe in /admin
        sync: false
      - key: CLARITY_DASHBOARD_URL # Microsoft Clarity link (button in /admin)
        sync: false
