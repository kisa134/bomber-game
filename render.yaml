# Render blueprint. In Render: New + -> Blueprint -> pick this repo (branch main).
# Render reads everything from here, so there's nothing to configure by hand.
services:
  - type: web
    name: bomberpump
    runtime: docker
    plan: starter # always-on (no idle spin-down / cold starts)
    region: frankfurt # close to EU/RU audience
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: . # build context = repo root (monorepo)
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      # Telegram Mini App: set these in the Render dashboard after BotFather.
      # TG_BOT = bot username (no @), TG_APP = Mini App short name from /newapp.
      # Used only to bounce the Phantom wallet flow back into the Mini App.
      - key: TG_BOT
        sync: false
      - key: TG_APP
        sync: false
      # Analytics. Client keys (VITE_*) are baked into the bundle at build time
      # (matching ARGs in the Dockerfile); server keys are runtime. All optional.
      - key: VITE_POSTHOG_KEY # PostHog publishable client key (phc_...)
        sync: false
      - key: VITE_GA_ID # Google Analytics 4 measurement id (G-...)
        sync: false
      - key: VITE_CLARITY_ID # Microsoft Clarity project id
        sync: false
      - key: POSTHOG_KEY # server-side PostHog key (for authoritative events)
        sync: false
      - key: ADMIN_TOKEN # protects /admin live dashboard (comma-separate for several passwords)
        sync: false
      - key: POSTHOG_EMBED_URL # PostHog shared dashboard embed URL (shown inside /admin)
        sync: false
