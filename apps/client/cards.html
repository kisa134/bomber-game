<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>BomberMeme — Character Cards</title>
  </head>
  <body>
    <header class="adm-top">
      <h1>🎨 Character Cards</h1>
      <p class="hint">
        Marketing kit: pick an animation + background, then download each character as an animated GIF / still PNG — or grab them all as one ZIP.
      </p>
      <div class="adm-controls">
        <label>Animation <select id="anim"></select></label>
        <label>Background <select id="bg"></select></label>
        <label>Rarity / colour <select id="rarity"></select></label>
        <label class="adm-check"><input id="showlabel" type="checkbox" checked /> Show rarity label</label>
        <label>Size <select id="size"></select></label>
        <label>Quality <select id="qual"></select></label>
        <label>QR / link <input id="link" type="text" placeholder="https://bombermeme.fun" /></label>
        <button id="apply">Apply link</button>
        <button id="dl-zip">📦 All as ZIP</button>
      </div>
    </header>
    <main id="grid" class="adm-grid"></main>
    <script type="module" src="/src/admin/main.ts"></script>
  </body>
</html>
