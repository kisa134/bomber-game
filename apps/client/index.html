<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Bomberpump</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Animated background (video loop with gradient fallback) -->
      <div id="bg">
        <video id="bg-video" autoplay muted loop playsinline></video>
      </div>

      <!-- Loading -->
      <section id="loading" class="screen">
        <div class="logo">💣 Bomberpump</div>
        <div class="spinner"></div>
        <p id="loading-status" class="status">loading…</p>
      </section>

      <!-- Home menu -->
      <section id="menu" class="screen hidden">
        <button id="open-settings" class="icon-btn" title="Settings">⚙</button>
        <div class="panel">
          <div class="logo">💣 Bomberpump</div>
          <p class="tagline">blow up your friends · pump.fun arena</p>
          <input id="nickname" maxlength="16" placeholder="nickname" autocomplete="off" />
          <div id="skins" class="skins"></div>
          <button id="quickplay" class="primary">⚡ Quickplay</button>
          <button id="practice">🤖 Practice vs bots</button>
          <div class="divider"><span>play with friends</span></div>
          <button id="create-room">➕ Create private room</button>
          <div class="join-row">
            <input id="join-code" maxlength="4" placeholder="CODE" autocomplete="off" />
            <button id="join-room">Join</button>
          </div>
          <p id="menu-status" class="status"></p>
        </div>
      </section>

      <!-- Settings -->
      <section id="settings" class="screen hidden">
        <div class="panel">
          <h2>⚙ Settings</h2>
          <div class="setting-row">
            <span>Music</span>
            <button id="set-music" class="toggle" data-on="true">On</button>
          </div>
          <div class="setting-row">
            <span>Sound effects</span>
            <button id="set-sfx" class="toggle" data-on="true">On</button>
          </div>
          <div class="setting-row">
            <span>Mobile controls</span>
            <div class="seg">
              <button id="ctl-joystick" class="seg-btn">Joystick</button>
              <button id="ctl-dpad" class="seg-btn">Buttons</button>
            </div>
          </div>
          <button id="settings-back" class="primary">Back</button>
        </div>
      </section>

      <!-- Waiting room -->
      <section id="room" class="screen hidden">
        <div class="panel">
          <h2>Waiting room</h2>
          <div id="room-code-box" class="hidden">
            <span class="label">Room code — share with friends</span>
            <div id="room-code" class="code"></div>
          </div>
          <ul id="room-players" class="players-list"></ul>
          <p id="room-status" class="status"></p>
          <button id="start-now" class="primary hidden">▶ Start now</button>
          <button id="leave-room" class="ghost">Leave</button>
        </div>
      </section>

      <!-- Game -->
      <section id="game" class="screen hidden">
        <div id="hud">
          <div id="timer">5:00</div>
          <div id="players"></div>
          <div id="ping">0 ms</div>
        </div>
        <canvas id="canvas"></canvas>

        <div id="touch-controls" class="hidden">
          <div id="dpad">
            <button data-dir="UP" class="dbtn up">▲</button>
            <button data-dir="LEFT" class="dbtn left">◀</button>
            <button data-dir="RIGHT" class="dbtn right">▶</button>
            <button data-dir="DOWN" class="dbtn down">▼</button>
          </div>
          <div id="joystick" class="hidden">
            <div id="joy-base"></div>
            <div id="joy-thumb"></div>
          </div>
          <button id="bomb-btn">💣</button>
        </div>
      </section>

      <!-- Result -->
      <section id="result" class="screen hidden">
        <div class="panel">
          <h2 id="result-title"></h2>
          <p class="status">back to the room for a rematch…</p>
          <button id="result-leave" class="ghost">Leave to menu</button>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
