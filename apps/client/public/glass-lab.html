<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glass Lab</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: #0b0a0e url("/bg/splash-art.png") center / cover no-repeat fixed;
    color: #fff; padding: 24px; min-height: 100vh;
  }
  body::before { content:""; position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(120% 90% at 50% 35%, rgba(0,0,0,.18), rgba(0,0,0,.6)); }
  .wrap { position: relative; max-width: 1080px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 26px; align-items: start; }
  @media (max-width: 820px){ .wrap { grid-template-columns: 1fr; } }

  .stage { display: flex; flex-direction: column; gap: 26px; padding: 20px 0; }
  .label { font: 500 12px/1 "Space Grotesk"; letter-spacing: 3px; text-transform: uppercase; opacity: .55; }
  .nav { display: flex; gap: 14px; flex-wrap: wrap; }
  .bigrow { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }

  .gbtn {
    position: relative; isolation: isolate;
    font: 700 16px/1 "Space Grotesk"; color: #fff;
    padding: 15px 26px; cursor: pointer;
    border-radius: var(--g-radius);
    background: linear-gradient(135deg, rgba(255,255,255,calc(var(--g-bg) * 1.7)), rgba(255,255,255,calc(var(--g-bg) * 0.4)));
    backdrop-filter: blur(var(--g-blur)) saturate(var(--g-sat)) brightness(var(--g-bright));
    -webkit-backdrop-filter: blur(var(--g-blur)) saturate(var(--g-sat)) brightness(var(--g-bright));
    border: 1px solid rgba(255,255,255,var(--g-border));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,var(--g-bevel)),
      inset 0 -2px 7px rgba(0,0,0,.28),
      0 12px 30px rgba(0,0,0,.36);
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
    transition: transform .15s cubic-bezier(.2,.7,.2,1);
  }
  .gbtn::after {
    content:""; position:absolute; inset:0; border-radius:inherit; z-index:-1; pointer-events:none;
    backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
    filter: url(#lab-distort);
  }
  .gbtn:hover { transform: translateY(-2px) scale(1.02); }
  .gbtn:active { transform: scale(.97); }
  .gbtn.on { color: #ffe27a; }

  .gbtn.play {
    font-size: 21px; font-weight: 800; letter-spacing: .5px; padding: 22px 54px;
    color: #fff7e6;
    background: linear-gradient(135deg, rgba(255,228,150,calc(var(--g-bg) * 2.4 + 0.14)), rgba(240,169,42,calc(var(--g-bg) * 1.5 + 0.05)));
    border: 1px solid rgba(255,225,150, calc(var(--g-border) + 0.15));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,var(--g-bevel)),
      inset 0 0 calc(var(--g-glow) * 46px) rgba(255,205,90, calc(var(--g-glow) * 0.95)),
      inset 0 0 calc(var(--g-glow) * 14px) rgba(255,240,200, calc(var(--g-glow) * 0.7)),
      0 14px 34px rgba(200,130,0,.45);
    text-shadow: 0 1px 3px rgba(120,70,0,.5);
  }

  .panel { position: sticky; top: 24px; background: rgba(18,16,24,.66); backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,.12); border-radius: 16px; padding: 18px; }
  .panel h3 { font: 600 14px/1 "Space Grotesk"; letter-spacing: .5px; margin-bottom: 14px; opacity:.9; }
  .ctl { margin-bottom: 13px; }
  .ctl .hd { display: flex; justify-content: space-between; font-size: 12px; opacity: .8; margin-bottom: 5px; }
  .ctl .hd b { font-weight: 600; color: #ffe27a; }
  input[type=range] { width: 100%; accent-color: #f0a92a; }
  .presets { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
  .preset { font: 600 11px/1 "Space Grotesk"; padding: 7px 10px; border-radius: 9px; cursor: pointer;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); color: #fff; }
  .preset:hover { background: rgba(255,255,255,.16); }
  .out { margin-top: 14px; font: 400 10.5px/1.5 "Space Mono", monospace; white-space: pre-wrap; color: #bfe; background: rgba(0,0,0,.35); padding: 10px; border-radius: 9px; max-height: 150px; overflow: auto; }
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <filter id="lab-distort" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="2" seed="7" result="n"/>
      <feGaussianBlur in="n" stdDeviation="2.2" result="b"/>
      <feDisplacementMap id="lab-disp" in="SourceGraphic" in2="b" scale="40" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <div class="wrap">
    <div class="stage" id="stage">
      <div>
        <div class="label">Header nav (HOME / ARENA / SHOP / RANKS)</div>
        <div class="nav" style="margin-top:12px">
          <div class="gbtn on">HOME</div>
          <div class="gbtn">ARENA</div>
          <div class="gbtn">SHOP</div>
          <div class="gbtn">RANKS</div>
        </div>
      </div>
      <div>
        <div class="label">Primary CTA — inner glow</div>
        <div class="bigrow" style="margin-top:12px">
          <div class="gbtn play">PLAY ONLINE</div>
          <div class="gbtn">vs Bots</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3>Glass parameters</h3>
      <div class="presets" id="presets"></div>
      <div id="controls"></div>
      <div class="out" id="out"></div>
    </div>
  </div>

  <script>
    const P = [
      { k:"blur",   label:"Blur",          min:0,  max:18, step:0.5, val:3,   unit:"px" },
      { k:"bg",     label:"Transparency",  min:0,  max:0.4, step:0.01, val:0.1 },
      { k:"sat",    label:"Saturation",    min:100, max:240, step:5, val:175, unit:"%" },
      { k:"bright", label:"Brightness",    min:0.85, max:1.4, step:0.01, val:1.08 },
      { k:"border", label:"Edge / rim",    min:0,  max:0.7, step:0.02, val:0.34 },
      { k:"bevel",  label:"Top bevel",     min:0,  max:0.9, step:0.02, val:0.6 },
      { k:"radius", label:"Corner",        min:6,  max:30, step:1, val:16, unit:"px" },
      { k:"refract",label:"Refraction",    min:0,  max:90, step:2, val:46 },
      { k:"glow",   label:"PLAY inner glow",min:0, max:1, step:0.02, val:0.45 },
    ];
    const PRESETS = {
      "Ultra clear":{blur:1.5,bg:0.06,sat:185,bright:1.12,border:0.4,bevel:0.7,radius:16,refract:64,glow:0.5},
      "Frosted":    {blur:9,bg:0.16,sat:165,bright:1.06,border:0.28,bevel:0.55,radius:16,refract:30,glow:0.4},
      "Crisp glass":{blur:3,bg:0.09,sat:200,bright:1.1,border:0.42,bevel:0.75,radius:14,refract:54,glow:0.55},
      "Subtle":     {blur:5,bg:0.1,sat:150,bright:1.04,border:0.22,bevel:0.45,radius:18,refract:22,glow:0.3},
      "Liquid":     {blur:2,bg:0.07,sat:210,bright:1.14,border:0.45,bevel:0.8,radius:20,refract:80,glow:0.7},
    };
    const stage = document.getElementById("stage");
    const out = document.getElementById("out");
    const disp = document.getElementById("lab-disp");
    const state = {};
    function apply(){
      for (const p of P){ if (p.k==="refract") continue; stage.style.setProperty("--g-"+p.k, state[p.k] + (p.unit||"")); }
      disp.setAttribute("scale", state.refract);
      out.textContent =
        "blur "+state.blur+"px · transp "+state.bg+" · sat "+state.sat+"% · bright "+state.bright+
        "\nrim "+state.border+" · bevel "+state.bevel+" · radius "+state.radius+"px"+
        "\nrefraction "+state.refract+" · play-glow "+state.glow;
    }
    const ctr = document.getElementById("controls");
    for (const p of P){
      state[p.k] = p.val;
      const row = document.createElement("div"); row.className = "ctl";
      row.innerHTML = '<div class="hd"><span>'+p.label+'</span><b id="v-'+p.k+'">'+p.val+(p.unit||"")+'</b></div>';
      const inp = document.createElement("input");
      inp.type="range"; inp.min=p.min; inp.max=p.max; inp.step=p.step; inp.value=p.val;
      inp.oninput = () => { state[p.k] = parseFloat(inp.value); document.getElementById("v-"+p.k).textContent = inp.value + (p.unit||""); apply(); };
      row.appendChild(inp); ctr.appendChild(row);
    }
    const pe = document.getElementById("presets");
    for (const name in PRESETS){
      const b = document.createElement("div"); b.className="preset"; b.textContent=name;
      b.onclick = () => { Object.assign(state, PRESETS[name]); for (const p of P){ const el=ctr.querySelector('input[type=range]'); } document.querySelectorAll('#controls input').forEach((inp,i)=>{ inp.value=state[P[i].k]; document.getElementById("v-"+P[i].k).textContent = state[P[i].k]+(P[i].unit||""); }); apply(); };
      pe.appendChild(b);
    }
    apply();
    window.__glassState = state;
  </script>
</body>
</html>
