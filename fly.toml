# Fly.io config for the authoritative game server.
# Deploy:  fly launch --no-deploy   then   fly deploy
app = "bomberpump"
primary_region = "ams" # close to EU/RU pump.fun audience

[build]
  dockerfile = "apps/server/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "8080"
  # Telegram Mini App: set your bot + app names (public, not secrets), e.g.
  #   fly secrets set TG_BOT=BombermemeBot TG_APP=play
  # TG_BOT = bot username (no @); TG_APP = Mini App short name from BotFather.

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
